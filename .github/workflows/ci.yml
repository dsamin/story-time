name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Genuinely runs everywhere: the import-clean chassis + the errorless core loop logic
  # (validator, session, mastery, all 5 stories) as plain Swift + Foundation.
  core-tests-linux:
    runs-on: ubuntu-24.04
    container: swift:6.0.3
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Drive the full core loop headlessly
        run: swift run storytime-demo

  # The SwiftUI app: generate the Xcode project, build for an iPad simulator, and drive
  # the full loop with XCUITest. Requires macOS (Xcode + iOS simulator).
  app-build-and-uitest-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select a modern Xcode (match XcodeGen's project format)
        run: |
          XC=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then XC=$(ls -d /Applications/Xcode_1*.app | sort -V | tail -1); fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"

      - name: Show Xcode / SDKs
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Pick an available iPad simulator
        id: sim
        run: |
          # Choose the first available iPad simulator and boot it, robust to runner image
          # changes (don't hardcode a device name that might not exist). Single-line
          # Python so the YAML block scalar stays valid.
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys,itertools; devs=list(itertools.chain.from_iterable(json.load(sys.stdin)['devices'].values())); ipads=[x for x in devs if 'iPad' in x['name']]; print(ipads[0]['udid'] if ipads else '')")
          if [ -z "$UDID" ]; then echo "No iPad simulator available"; xcrun simctl list devices; exit 1; fi
          echo "Using iPad simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true

      - name: Build for the iPad simulator
        run: |
          xcodebuild \
            -scheme StoryTime \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            build

      - name: Drive the full loop with XCUITest
        run: |
          xcodebuild \
            -scheme StoryTime \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            -resultBundlePath TestResults.xcresult \
            test

      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
